<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hide { display: none !important; }

        /* ── Image Upload Widget ── */
        .upload-drop-zone {
            border: 2px dashed rgba(124, 58, 237, 0.4);
            border-radius: 12px;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            position: relative;
            background: rgba(15, 23, 42, 0.5);
        }
        .upload-drop-zone:hover {
            border-color: rgba(124, 58, 237, 0.8);
            background: rgba(124, 58, 237, 0.05);
        }
        .upload-drop-zone.drag-over {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.15);
            transform: scale(1.01);
        }
        .upload-placeholder {
            text-align: center;
            padding: 20px;
            pointer-events: none;
        }
        .upload-preview {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }
        .upload-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            animation: progress-pulse 1s ease infinite;
        }
        @keyframes progress-pulse {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Login View -->
    <div id="loginView" class="flex-1 flex items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <i class="ph ph-user-circle-gear text-6xl text-purple-500 mb-2"></i>
                <h1 class="text-2xl font-bold">Admin Portal</h1>
                <p class="text-slate-400 text-sm">Sign in to manage your portfolio</p>
            </div>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                    <input type="text" id="username" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input type="password" id="password" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-purple-500" required>
                </div>
                <div id="loginError" class="text-red-400 text-sm hidden">Invalid credentials</div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg px-4 py-2 transition-colors">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="hide flex-1 flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-64 glass-panel border-r border-slate-800 flex flex-col hidden md:flex">
            <div class="p-6 flex items-center gap-3 border-b border-slate-800">
                <i class="ph ph-shield-check text-2xl text-purple-500"></i>
                <span class="font-bold text-lg tracking-wide">Admin</span>
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="sidebarNav">
                <a href="#" data-target="contacts" class="nav-btn flex items-center gap-3 px-4 py-3 rounded-lg bg-purple-600/20 text-purple-400"><i class="ph ph-envelope text-xl"></i> Messages</a>
                <a href="#" data-target="projects" class="nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"><i class="ph ph-folder text-xl"></i> Projects</a>
                <a href="#" data-target="testimonials" class="nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"><i class="ph ph-users text-xl"></i> Testimonials</a>
                <a href="#" data-target="slider" class="nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"><i class="ph ph-images text-xl"></i> Slider Images</a>
                <a href="#" data-target="settings" class="nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"><i class="ph ph-gear text-xl"></i> Settings</a>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-800 text-red-400 hover:bg-slate-700 transition-colors">
                    <i class="ph ph-sign-out"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#0f172a]">
            <!-- Topbar mobile -->
            <header class="md:hidden glass-panel p-4 flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center gap-2">
                    <i class="ph ph-shield-check text-xl text-purple-500"></i>
                    <span class="font-bold">Admin</span>
                </div>
                <button id="mobileMenuBtn" class="text-2xl"><i class="ph ph-list"></i></button>
            </header>
            
            <div class="flex-1 overflow-y-auto p-4 md:p-8 relative" id="mainContentArea">
                <!-- Content injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 hide">
        <div class="glass-panel p-6 md:p-8 rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto relative">
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-white"><i class="ph ph-x text-xl"></i></button>
            <h2 id="modalTitle" class="text-xl font-bold mb-6">Add New</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
